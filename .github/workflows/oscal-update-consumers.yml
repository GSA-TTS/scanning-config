name: Notify OSCAL Consumers

on:
  release:
    types: [published]

permissions: {}

jobs:
  notify-consumers:
    name: Open PRs in consuming repos
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Add repos that import the org-dependency-management component definition
        consumer:
          - GSA-TTS/pic-blm-cxworks
          # Add more repos here as they adopt the component definition
      fail-fast: false
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }} # zizmor: ignore[secrets-outside-env]
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }} # zizmor: ignore[secrets-outside-env]
          owner: ${{ github.repository_owner }}
          repositories: ${{ matrix.consumer }}

      - name: Checkout consumer repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ matrix.consumer }}
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Checkout signed-commit action
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: .github/actions/signed-commit
          path: _scanning-service
          persist-credentials: false

      - name: Download latest component definition
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          # Find the component-definitions directory in the consumer
          COMP_DIR=$(find docs -type d -name "org-dependency-management" 2>/dev/null | head -1)

          if [ -z "$COMP_DIR" ]; then
            echo "No org-dependency-management directory found in consumer repo. Skipping."
            exit 0
          fi

          # Download the updated component definition from the release
          curl -sfL \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/octet-stream" \
            "https://api.github.com/repos/${{ github.repository }}/contents/docs/compliance/component-definitions/org-dependency-management/component-definition.json?ref=${TAG}" \
            | jq -r '.content' | base64 -d > "${COMP_DIR}/component-definition.json"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "No changes to component definition. Skipping PR."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create signed commit
        if: steps.changes.outputs.has_changes == 'true'
        uses: ./_scanning-service/.github/actions/signed-commit
        with:
          repository: ${{ matrix.consumer }}
          branch: chore/update-org-dependency-management-${{ github.event.release.tag_name }}
          commit-message: "chore: update org-dependency-management component definition to ${{ github.event.release.tag_name }}"
          token: ${{ steps.app-token.outputs.token }}

      - name: Create PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          gh pr create \
            --title "chore: update org-dependency-management OSCAL component to ${TAG}" \
            --body "Updates the org-dependency-management component definition to [${TAG}](https://github.com/${{ github.repository }}/releases/tag/${TAG}).

          This is an automated PR from the [scanning-service OSCAL update workflow](https://github.com/${{ github.repository }}/actions/workflows/oscal-update-consumers.yml).

          Review the [release notes](https://github.com/${{ github.repository }}/releases/tag/${TAG}) for details on control statement changes." \
            --head "chore/update-org-dependency-management-${TAG}" \
            --base main
